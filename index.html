<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Roedor de Dividendos - Fase 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Previne scroll na janela do jogo */
            touch-action: none; /* Melhora a resposta ao toque em telemóveis */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ff7e5f 0%, #feb47b 100%);
        }

        /* Interface do Utilizador (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; /* Para não bloquear os cliques no canvas */
            z-index: 10;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .hud-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fbbf24;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            background: rgba(15, 23, 42, 0.7);
            padding: 10px 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* Ecrã de Fim de Jogo */
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 3px solid #ef4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: none; /* Escondido inicialmente */
            z-index: 20;
            width: 90%;
            max-width: 400px;
        }

        #game-over h2 {
            color: #ef4444;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        #game-over p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #cbd5e1;
        }

        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 0 #059669;
        }

        button:hover {
            background: #34d399;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #059669;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Ecrã Inicial */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }

        .instructions {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .instructions li {
            margin: 10px 0;
            font-size: 1.1rem;
            list-style: none;
        }

        @media (max-width: 768px) {
            #hud {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                padding: 10px;
            }
            .hud-title {
                order: -1; /* Coloca o título no topo em telemóveis */
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Interface HUD -->
        <div id="hud">
            <div class="hud-panel">
                <span style="font-size: 1.8rem;">❤️</span>
                <span class="stat-value" id="lives">3</span>
            </div>
            
            <div class="hud-title">Fase 1: O Início</div>
            
            <div class="hud-panel">
                <span style="font-size: 1.8rem;">💰</span>
                <span class="stat-value" id="seeds">0</span>
            </div>
        </div>

        <!-- Ecrã Inicial -->
        <div id="start-screen">
            <h1 style="color: #fbbf24; font-size: 3rem; margin-bottom: 10px; text-shadow: 3px 3px 0 #b45309;">O Roedor de Dividendos</h1>
            <p style="font-size: 1.2rem; color: #cbd5e1;">A Caminho da Corretora!</p>
            
            <ul class="instructions">
                <li>👆 <strong>Tocar / Espaço / Seta Cima:</strong> Pular</li>
                <li>💰 <strong>Sementes:</strong> Apanhe para investir depois (+10)</li>
                <li>✉️ <strong>Boletos:</strong> Fuja deles ou perderá vida!</li>
            </ul>

            <button onclick="startGame()">Começar a Correr!</button>
        </div>

        <!-- Ecrã de Game Over -->
        <div id="game-over">
            <h2>Burnout!</h2>
            <p>Os boletos foram mais fortes...</p>
            <p>Património Final: <strong style="color: #fbbf24;">💰 <span id="final-score">0</span></strong></p>
            <button onclick="startGame()">Tentar Novamente</button>
        </div>

        <!-- O Canvas do Jogo -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- NOVO: Carregamento da Sprite Sheet ---
        const spriteSheet = new Image();
        let isImageLoaded = false;
        spriteSheet.crossOrigin = "Anonymous"; // Previne erros de CORS no Canvas
        
        spriteSheet.onload = () => {
            console.log("Sprite sheet carregada com sucesso!");
            isImageLoaded = true;
        };
        spriteSheet.onerror = () => {
            console.warn("Falha ao carregar a Sprite Sheet. A utilizar o fallback de Emojis.");
            isImageLoaded = false;
        };
        spriteSheet.src = 'https://heltongoncalves.github.io/roedor-de-dividendos-assets/G0001.png';

        // --- Mapeamento da Matriz de Ativos Visuais ---
        // Baseado na estrutura solicitada: 
        // Linhas 1-4: Personagem | Linha 5: Plataformas | Linhas 6-7: Desafios e Coletáveis
        // Constantes baseadas numa grelha hipotética de 128px para o personagem e 64px para itens
        const pSize = 128; // Player Size na imagem original
        const iSize = 64;  // Item Size na imagem original

        const SPRITE_MAP = {
            // Seção 1: CIFRÃO (Ex: Linha 2, Coluna 1 da matriz para a animação "Correndo")
            jogador: { x: pSize * 0, y: pSize * 1, w: pSize, h: pSize }, 
            
            // Seção 3: DESAFIOS E COLEÇÃO (Itens menores localizados mais abaixo na matriz)
            // Ex: Semente na Linha 7, Boleto na Linha 6
            semente: { x: 0,         y: pSize * 4 + iSize * 1, w: iSize, h: iSize }, 
            boleto:  { x: iSize * 2, y: pSize * 4 + iSize * 0, w: iSize, h: iSize }  
        };
        // -----------------------------------------

        // Elementos UI
        const hudLives = document.getElementById('lives');
        const hudSeeds = document.getElementById('seeds');
        const gameOverScreen = document.getElementById('game-over');
        const startScreen = document.getElementById('start-screen');
        const finalScoreLabel = document.getElementById('final-score');

        // Estado do Jogo
        let animationId;
        let isPlaying = false;
        let score = 0;
        let lives = 3;
        let gameSpeed = 6;
        let frameCount = 0;
        
        // Entidades
        let player;
        let obstacles = [];
        let collectibles = [];
        let particles = [];

        // Constantes da Física
        const GRAVITY = 0.6;
        const JUMP_FORCE = -14;
        const FLOOR_HEIGHT = 80;

        // Redimensionar Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (player) {
                // Ajusta a posição do jogador se o ecrã mudar
                if (player.y > canvas.height - FLOOR_HEIGHT - player.size) {
                    player.y = canvas.height - FLOOR_HEIGHT - player.size;
                }
            }
        }
        window.addEventListener('resize', resize);
        resize(); // Configuração inicial

        // --- CLASSES ---

        class Player {
            constructor() {
                this.size = 60;
                this.x = 80;
                this.y = canvas.height - FLOOR_HEIGHT - this.size;
                this.vy = 0;
                this.isGrounded = true;
                this.rotation = 0;
            }

            jump() {
                if (this.isGrounded) {
                    this.vy = JUMP_FORCE;
                    this.isGrounded = false;
                    createParticles(this.x + this.size/2, this.y + this.size, '#cbd5e1', 5);
                }
            }

            update() {
                this.vy += GRAVITY;
                this.y += this.vy;

                // Colisão com o chão
                if (this.y + this.size >= canvas.height - FLOOR_HEIGHT) {
                    this.y = canvas.height - FLOOR_HEIGHT - this.size;
                    this.vy = 0;
                    this.isGrounded = true;
                    this.rotation = 0; // Volta ao normal quando aterra
                } else {
                    // Roda ligeiramente ao pular
                    this.rotation = Math.min(this.vy * 2, 45); 
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rotation * Math.PI / 180);
                
                if (isImageLoaded) {
                    // Desenha o sprite mapeado do Hamster (Ajusta p/ o tamanho desenhado 'this.size')
                    const s = SPRITE_MAP.jogador;
                    ctx.drawImage(spriteSheet, s.x, s.y, s.w, s.h, -this.size/2, -this.size/2, this.size, this.size);
                } else {
                    // Desenha o Hamster (utilizando Emoji em alta resolução como fallback dinâmico)
                    ctx.font = `${this.size}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("🐹", 0, 0);
                    
                    // Adiciona uma prancha de surf rudimentar por baixo
                    if (!this.isGrounded) {
                        ctx.fillStyle = '#d97706'; // Cor de madeira
                        ctx.beginPath();
                        ctx.ellipse(0, this.size/2 - 10, 35, 8, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                ctx.restore();
            }
        }

        class Entity {
            constructor(type) {
                this.type = type; // 'boleto' ou 'semente'
                this.size = type === 'boleto' ? 50 : 40;
                this.x = canvas.width + 50;
                
                // Sementes podem aparecer no ar, boletos ficam no chão (maioritariamente)
                if (type === 'semente') {
                    // Posição Y aleatória: perto do chão ou altura do salto
                    this.y = canvas.height - FLOOR_HEIGHT - this.size - (Math.random() * 150);
                } else {
                    this.y = canvas.height - FLOOR_HEIGHT - this.size;
                }
                
                this.markedForDeletion = false;
                this.hoverOffset = 0; // Para animação de flutuar
            }

            update() {
                this.x -= gameSpeed;
                if (this.x + this.size < 0) this.markedForDeletion = true;

                // Animação de flutuação suave
                this.hoverOffset = Math.sin(frameCount * 0.1) * 5;
            }

            draw() {
                ctx.save();
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                if (this.type === 'semente') {
                    ctx.translate(this.x + this.size/2, this.y + this.size/2 + this.hoverOffset);
                    if (isImageLoaded) {
                        const s = SPRITE_MAP.semente;
                        ctx.drawImage(spriteSheet, s.x, s.y, s.w, s.h, -this.size/2, -this.size/2, this.size, this.size);
                    } else {
                        ctx.fillText("💰", 0, 0);
                        // Brilho na semente
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = "gold";
                    }
                } else {
                    ctx.translate(this.x + this.size/2, this.y + this.size/2);
                    if (isImageLoaded) {
                        const s = SPRITE_MAP.boleto;
                        ctx.drawImage(spriteSheet, s.x, s.y, s.w, s.h, -this.size/2, -this.size/2, this.size, this.size);
                    } else {
                        // Faz o boleto vibrar ligeiramente
                        const shake = Math.random() * 4 - 2;
                        ctx.fillText("✉️", shake, 0);
                        
                        // Ícone de imposto
                        ctx.fillStyle = "red";
                        ctx.font = "20px Arial";
                        ctx.fillText("!", 15, -15);
                    }
                }
                
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.vx = Math.random() * 4 - 2;
                this.vy = Math.random() * -4 - 1;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.05;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // --- SISTEMAS DO JOGO ---

        function createParticles(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function handleSpawns() {
            // Aumenta a velocidade do jogo gradualmente
            if (frameCount % 600 === 0) gameSpeed += 0.5;

            // Spawn rate aleatório
            if (frameCount % 90 === 0 || (Math.random() < 0.01 && frameCount % 30 === 0)) {
                // 30% chance de Boleto, 70% de Semente
                const type = Math.random() < 0.35 ? 'boleto' : 'semente';
                
                if (type === 'boleto') {
                    obstacles.push(new Entity('boleto'));
                } else {
                    collectibles.push(new Entity('semente'));
                }
            }
        }

        function drawBackground() {
            // Sol
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.8, canvas.height * 0.4, 80, 0, Math.PI * 2);
            ctx.fill();

            // Ondas no fundo (Parallax)
            ctx.fillStyle = '#0ea5e9'; // Cor do mar
            ctx.fillRect(0, canvas.height - FLOOR_HEIGHT - 40, canvas.width, 40);
            
            // Chão / Areia da Praia
            ctx.fillStyle = '#fcd34d'; 
            ctx.fillRect(0, canvas.height - FLOOR_HEIGHT, canvas.width, FLOOR_HEIGHT);

            // Detalhes da areia em movimento
            ctx.fillStyle = '#d97706';
            for (let i = 0; i < 10; i++) {
                let pX = ((frameCount * 2) + i * 200) % canvas.width;
                ctx.fillRect(canvas.width - pX, canvas.height - FLOOR_HEIGHT + 20, 15, 5);
            }
        }

        function checkCollision(player, entity) {
            // Hitbox reduzida para ser mais justo
            const hitMargin = 15; 
            return (
                player.x + hitMargin < entity.x + entity.size - hitMargin &&
                player.x + player.size - hitMargin > entity.x + hitMargin &&
                player.y + hitMargin < entity.y + entity.size - hitMargin &&
                player.y + player.size - hitMargin > entity.y + hitMargin
            );
        }

        function updateHUD() {
            hudSeeds.innerText = score;
            hudLives.innerText = lives;
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            gameOverScreen.style.display = 'block';
            finalScoreLabel.innerText = score;
        }

        // --- LOOP PRINCIPAL ---

        function init() {
            player = new Player();
            obstacles = [];
            collectibles = [];
            particles = [];
            score = 0;
            lives = 3;
            gameSpeed = 6;
            frameCount = 0;
            updateHUD();
        }

        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();

            // Jogador
            player.update();
            player.draw();

            handleSpawns();

            // Gestão de Colecionáveis (Sementes)
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let s = collectibles[i];
                s.update();
                s.draw();

                if (checkCollision(player, s)) {
                    score += 10;
                    updateHUD();
                    createParticles(s.x + s.size/2, s.y + s.size/2, '#fbbf24', 8);
                    collectibles.splice(i, 1);
                } else if (s.markedForDeletion) {
                    collectibles.splice(i, 1);
                }
            }

            // Gestão de Obstáculos (Boletos)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.update();
                o.draw();

                if (checkCollision(player, o)) {
                    lives--;
                    updateHUD();
                    createParticles(player.x + player.size/2, player.y + player.size/2, '#ef4444', 15);
                    
                    // Efeito de ecrã a tremer
                    canvas.style.transform = `translate(${Math.random()*10 - 5}px, ${Math.random()*10 - 5}px)`;
                    setTimeout(() => canvas.style.transform = 'translate(0, 0)', 100);

                    obstacles.splice(i, 1); // Remove o boleto após bater

                    if (lives <= 0) {
                        gameOver();
                    }
                } else if (o.markedForDeletion) {
                    obstacles.splice(i, 1);
                }
            }

            // Partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            frameCount++;
            animationId = requestAnimationFrame(animate);
        }

        // --- CONTROLOS ---

        function startGame() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            init();
            isPlaying = true;
            animate();
        }

        // Teclado
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (isPlaying) player.jump();
            }
        });

        // Toque (Telemóvel / Tablet)
        window.addEventListener('touchstart', (e) => {
            // Apenas salta se não estiver a clicar num botão UI
            if (e.target.tagName !== 'BUTTON' && isPlaying) {
                e.preventDefault(); // Previne scroll
                player.jump();
            }
        }, { passive: false });

    </script>
</body>
</html>
