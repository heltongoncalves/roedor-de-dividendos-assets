<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Roedor de Dividendos - Fase 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            touch-action: none; 
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            /* Fundo gradiente caso a imagem de fundo falhe/demore */
            background: linear-gradient(to bottom, #1e3a8a 0%, #0ea5e9 100%);
        }

        /* Interface HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none; 
            z-index: 10;
        }

        .hud-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hud-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fbbf24;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .stat-value { font-size: 1.5rem; font-weight: 800; }

        /* Ecrãs (Inicial e Game Over) */
        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }

        #game-over { display: none; }

        .modal-box {
            background: rgba(30, 41, 59, 0.95);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 3px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 90%;
            width: 450px;
        }

        #game-over .modal-box { border-color: #ef4444; }

        h1 { color: #fbbf24; font-size: 2.5rem; text-shadow: 3px 3px 0 #b45309; line-height: 1.2; margin-bottom: 10px;}
        h2 { color: #ef4444; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 20px; }

        .instructions {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .instructions li { margin: 10px 0; list-style: none; }

        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 6px 0 #059669;
            margin-top: 10px;
            width: 100%;
        }

        button:hover { background: #34d399; transform: translateY(-2px); box-shadow: 0 8px 0 #059669; }
        button:active { transform: translateY(6px); box-shadow: none; }

        @media (max-width: 768px) {
            #hud { flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
            .hud-title { order: -1; width: 100%; text-align: center; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Interface HUD -->
        <div id="hud">
            <div class="hud-panel">
                <span style="font-size: 1.8rem;">❤️</span>
                <span class="stat-value" id="lives">3</span>
            </div>
            <div class="hud-title">Fase 1: O Início</div>
            <div class="hud-panel">
                <span style="font-size: 1.8rem;">💰</span>
                <span class="stat-value" id="seeds">0</span>
            </div>
        </div>

        <!-- Ecrã Inicial -->
        <div id="start-screen" class="screen-overlay">
            <div class="modal-box">
                <h1>O Roedor de Dividendos</h1>
                <p>A Caminho da Corretora!</p>
                <ul class="instructions">
                    <li>👆 <strong>Pular:</strong> Tocar / Espaço / Seta Cima</li>
                    <li>💰 <strong>Sementes:</strong> Apanhe para investir depois</li>
                    <li>✉️ <strong>Boletos:</strong> Fuja para não perder vida!</li>
                </ul>
                <button onclick="startGame()">Começar a Correr!</button>
            </div>
        </div>

        <!-- Ecrã de Game Over -->
        <div id="game-over" class="screen-overlay">
            <div class="modal-box">
                <h2>Burnout!</h2>
                <p>A corrida dos ratos venceu desta vez...</p>
                <p>Património Final: <strong style="color: #fbbf24;">💰 <span id="final-score">0</span></strong></p>
                <button onclick="startGame()">Tentar Novamente</button>
            </div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- GESTÃO DA SPRITE SHEET ---
        const spriteSheet = new Image();
        let isImageLoaded = false;
        spriteSheet.crossOrigin = "Anonymous"; 
        
        spriteSheet.onload = () => {
            console.log("Sprite sheet matriz carregada com sucesso!");
            isImageLoaded = true;
        };
        spriteSheet.onerror = () => {
            console.warn("Falha a carregar a imagem. Fallback ativado.");
            isImageLoaded = false;
        };
        // URL da imagem no seu repositório
        spriteSheet.src = 'https://heltongoncalves.github.io/roedor-de-dividendos-assets/G0001.png';

        /* * MAPEAMENTO DE COORDENADAS NORMALIZADAS (0 a 1)
         * Baseado na matriz visual G0001.jpg fornecida.
         * Formato: [x_inicial, y_inicial, largura, altura]
         */
        const SPRITE_MAP = {
            // Animação de corrida (Linha 2 da Secção 1) - 4 frames
            playerRun: [
                [0.015, 0.205, 0.08, 0.15],
                [0.125, 0.205, 0.08, 0.15],
                [0.235, 0.205, 0.08, 0.15],
                [0.345, 0.205, 0.08, 0.15]
            ],
            // Pulo/Surf (Linha 3, frame 2)
            playerJump: [0.125, 0.380, 0.09, 0.15], 
            // Animação da Moeda/Semente (Secção 3) - 4 frames
            coin: [
                [0.515, 0.585, 0.045, 0.085],
                [0.585, 0.585, 0.045, 0.085],
                [0.655, 0.585, 0.045, 0.085],
                [0.725, 0.585, 0.045, 0.085]
            ],
            // Animação do Boleto (Secção 3) - 3 frames
            boleto: [
                [0.510, 0.445, 0.075, 0.075],
                [0.595, 0.445, 0.075, 0.075],
                [0.675, 0.445, 0.075, 0.075]
            ],
            // Paisagem da Cidade Synthwave (Imagem 9 da Secção 2)
            bgCity: [0.015, 0.77, 0.28, 0.21],
            // Plataforma de Madeira para o Chão (Imagem 4 da Secção 2)
            platform: [0.30, 0.505, 0.19, 0.11]
        };

        // Função utilitária para desenhar a partir do mapeamento normalizado
        function drawSprite(mapData, x, y, width, height) {
            if (!isImageLoaded) return false;
            const sx = mapData[0] * spriteSheet.width;
            const sy = mapData[1] * spriteSheet.height;
            const sw = mapData[2] * spriteSheet.width;
            const sh = mapData[3] * spriteSheet.height;
            ctx.drawImage(spriteSheet, sx, sy, sw, sh, x, y, width, height);
            return true;
        }

        // --- VARIÁVEIS DE ESTADO ---
        const hudLives = document.getElementById('lives');
        const hudSeeds = document.getElementById('seeds');
        
        let animationId;
        let isPlaying = false;
        let score = 0;
        let lives = 3;
        let gameSpeed = 6;
        let frameCount = 0;
        let bgOffset = 0;
        let floorOffset = 0;
        
        let player;
        let obstacles = [];
        let collectibles = [];
        let particles = [];

        // Constantes Físicas
        const GRAVITY = 0.6;
        const JUMP_FORCE = -14;
        const FLOOR_HEIGHT = 90; // Altura da plataforma de madeira na tela

        // Ajuste de Resolução Responsiva
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (player && player.isGrounded) {
                player.y = canvas.height - FLOOR_HEIGHT - player.size + 10;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- CLASSES ---

        class Player {
            constructor() {
                this.size = 80; // Tamanho de desenho na tela
                this.hitSize = 50; // Hitbox um pouco menor para ser justo
                this.x = 80;
                this.y = canvas.height - FLOOR_HEIGHT - this.size + 10;
                this.vy = 0;
                this.isGrounded = true;
                
                // Variáveis de Animação
                this.animFrame = 0;
                this.animTimer = 0;
            }

            jump() {
                if (this.isGrounded) {
                    this.vy = JUMP_FORCE;
                    this.isGrounded = false;
                    createParticles(this.x + this.size/2, this.y + this.size, '#cbd5e1', 5);
                }
            }

            update() {
                this.vy += GRAVITY;
                this.y += this.vy;

                const floorLevel = canvas.height - FLOOR_HEIGHT - this.size + 10;
                if (this.y >= floorLevel) {
                    this.y = floorLevel;
                    this.vy = 0;
                    this.isGrounded = true;
                }

                // Controlar frames de animação da corrida
                if (this.isGrounded) {
                    this.animTimer++;
                    if (this.animTimer > 5) { // Troca de sprite a cada 5 frames (velocidade da corrida)
                        this.animFrame = (this.animFrame + 1) % SPRITE_MAP.playerRun.length;
                        this.animTimer = 0;
                    }
                }
            }

            draw() {
                if (isImageLoaded) {
                    let spriteData;
                    if (this.isGrounded) {
                        spriteData = SPRITE_MAP.playerRun[this.animFrame];
                    } else {
                        // Se estiver no ar, usa o frame de salto/surf
                        spriteData = SPRITE_MAP.playerJump;
                    }
                    drawSprite(spriteData, this.x, this.y, this.size, this.size);
                } else {
                    // Fallback
                    ctx.save();
                    ctx.translate(this.x + this.size/2, this.y + this.size/2);
                    if(!this.isGrounded) ctx.rotate(Math.min(this.vy * 2, 45) * Math.PI / 180);
                    ctx.font = `${this.size - 20}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("🐹", 0, 0);
                    ctx.restore();
                }

                // Debug Hitbox (descomente para ver):
                // ctx.strokeStyle = 'red'; ctx.strokeRect(this.x + 15, this.y + 15, this.hitSize, this.hitSize);
            }
        }

        class Entity {
            constructor(type) {
                this.type = type; // 'boleto' ou 'semente'
                this.size = type === 'boleto' ? 60 : 50;
                this.hitSize = type === 'boleto' ? 40 : 35;
                this.x = canvas.width + 50;
                
                if (type === 'semente') {
                    // Sementes aparecem em alturas variadas
                    this.y = canvas.height - FLOOR_HEIGHT - this.size - (Math.random() * 160);
                } else {
                    // Boletos rastejam no chão
                    this.y = canvas.height - FLOOR_HEIGHT - this.size + 15;
                }
                
                this.markedForDeletion = false;
                
                // Animação
                this.animFrame = 0;
                this.animTimer = 0;
                this.hoverOffset = 0;
            }

            update() {
                this.x -= gameSpeed;
                if (this.x + this.size < -50) this.markedForDeletion = true;

                // Atualizar frame da animação
                this.animTimer++;
                const framesLength = this.type === 'semente' ? SPRITE_MAP.coin.length : SPRITE_MAP.boleto.length;
                if (this.animTimer > 6) { // Velocidade da animação do item
                    this.animFrame = (this.animFrame + 1) % framesLength;
                    this.animTimer = 0;
                }

                if (this.type === 'semente') {
                    this.hoverOffset = Math.sin(frameCount * 0.1) * 6; // Flutua suavemente
                }
            }

            draw() {
                const drawY = this.y + this.hoverOffset;
                
                if (isImageLoaded) {
                    const spriteData = this.type === 'semente' 
                        ? SPRITE_MAP.coin[this.animFrame] 
                        : SPRITE_MAP.boleto[this.animFrame];
                    
                    drawSprite(spriteData, this.x, drawY, this.size, this.size);
                } else {
                    // Fallback
                    ctx.font = `${this.size - 10}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    if (this.type === 'semente') {
                        ctx.shadowBlur = 15; ctx.shadowColor = "gold";
                        ctx.fillText("💰", this.x + this.size/2, drawY + this.size/2);
                        ctx.shadowBlur = 0;
                    } else {
                        const shake = Math.random() * 4 - 2;
                        ctx.fillText("✉️", this.x + this.size/2 + shake, drawY + this.size/2);
                    }
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 6 + 3;
                this.vx = Math.random() * 6 - 3;
                this.vy = Math.random() * -5 - 2;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.04;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // --- SISTEMAS DO JOGO ---

        function createParticles(x, y, color, amount) {
            for (let i = 0; i < amount; i++) particles.push(new Particle(x, y, color));
        }

        function handleSpawns() {
            if (frameCount % 600 === 0) gameSpeed += 0.4; // Dificuldade progressiva

            if (frameCount % 90 === 0 || (Math.random() < 0.02 && frameCount % 40 === 0)) {
                if (Math.random() < 0.35) obstacles.push(new Entity('boleto'));
                else collectibles.push(new Entity('semente'));
            }
        }

        function drawBackground() {
            // Desenha a Cidade Synthwave em Paralaxe (Move mais devagar)
            bgOffset -= gameSpeed * 0.3;
            
            if (isImageLoaded) {
                // Calcula a largura da cidade baseada na proporção da altura para manter aspect ratio
                const bgHeight = canvas.height - FLOOR_HEIGHT;
                const bgWidth = bgHeight * (SPRITE_MAP.bgCity[2] / SPRITE_MAP.bgCity[3]);
                
                if (bgOffset <= -bgWidth) bgOffset = 0;
                
                // Desenha lado a lado para preencher a tela
                for(let i = 0; i < Math.ceil(canvas.width / bgWidth) + 1; i++) {
                    drawSprite(SPRITE_MAP.bgCity, bgOffset + (i * bgWidth), 0, bgWidth, bgHeight);
                }
            } else {
                // Fallback sol
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath(); ctx.arc(canvas.width * 0.8, canvas.height * 0.4, 80, 0, Math.PI * 2); ctx.fill();
            }

            // Desenha o Chão de Madeira
            floorOffset -= gameSpeed;
            if (isImageLoaded) {
                // Para o chão, forçamos a altura e calculamos a largura proporcional
                const floorW = FLOOR_HEIGHT * (SPRITE_MAP.platform[2] / SPRITE_MAP.platform[3]) * 1.5;
                if (floorOffset <= -floorW) floorOffset = 0;
                
                for(let i = 0; i < Math.ceil(canvas.width / floorW) + 1; i++) {
                    drawSprite(SPRITE_MAP.platform, floorOffset + (i * floorW), canvas.height - FLOOR_HEIGHT, floorW, FLOOR_HEIGHT);
                }
            } else {
                ctx.fillStyle = '#fcd34d'; 
                ctx.fillRect(0, canvas.height - FLOOR_HEIGHT, canvas.width, FLOOR_HEIGHT);
                ctx.fillStyle = '#d97706';
                for (let i = 0; i < 10; i++) {
                    let pX = ((frameCount * 2) + i * 200) % canvas.width;
                    ctx.fillRect(canvas.width - pX, canvas.height - FLOOR_HEIGHT + 20, 15, 5);
                }
            }
        }

        function checkCollision(player, entity) {
            // Usa as hitBoxes reduzidas para uma jogabilidade mais justa e precisa
            const pX = player.x + (player.size - player.hitSize) / 2;
            const pY = player.y + (player.size - player.hitSize) / 2;
            const eX = entity.x + (entity.size - entity.hitSize) / 2;
            const eY = entity.y + (entity.size - entity.hitSize) / 2;

            return (
                pX < eX + entity.hitSize &&
                pX + player.hitSize > eX &&
                pY < eY + entity.hitSize &&
                pY + player.hitSize > eY
            );
        }

        function updateHUD() {
            hudSeeds.innerText = score;
            hudLives.innerText = lives;
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        // --- LOOP PRINCIPAL ---

        function init() {
            player = new Player();
            obstacles = []; collectibles = []; particles = [];
            score = 0; lives = 3; gameSpeed = 6; frameCount = 0;
            bgOffset = 0; floorOffset = 0;
            updateHUD();
        }

        function animate() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();

            // Jogador
            player.update();
            player.draw();

            handleSpawns();

            // Colecionáveis (Moedas/Sementes)
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let s = collectibles[i];
                s.update();
                s.draw();

                if (checkCollision(player, s)) {
                    score += 10;
                    updateHUD();
                    createParticles(s.x + s.size/2, s.y + s.size/2, '#fbbf24', 10);
                    collectibles.splice(i, 1);
                } else if (s.markedForDeletion) {
                    collectibles.splice(i, 1);
                }
            }

            // Obstáculos (Boletos)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.update();
                o.draw();

                if (checkCollision(player, o)) {
                    lives--;
                    updateHUD();
                    createParticles(player.x + player.size/2, player.y + player.size/2, '#ef4444', 15);
                    
                    canvas.style.transform = `translate(${Math.random()*10 - 5}px, ${Math.random()*10 - 5}px)`;
                    setTimeout(() => canvas.style.transform = 'translate(0, 0)', 100);

                    obstacles.splice(i, 1);

                    if (lives <= 0) gameOver();
                } else if (o.markedForDeletion) {
                    obstacles.splice(i, 1);
                }
            }

            // Partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            frameCount++;
            animationId = requestAnimationFrame(animate);
        }

        // --- CONTROLOS ---
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            init();
            isPlaying = true;
            animate();
        }

        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && isPlaying) player.jump();
        });

        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'BUTTON' && isPlaying) {
                e.preventDefault();
                player.jump();
            }
        }, { passive: false });

    </script>
</body>
</html>
